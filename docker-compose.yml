version: '3.8'
services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3001:3001"
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./backend/data:/usr/src/app/data

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
